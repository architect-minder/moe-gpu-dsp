name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-no-cuda:
    name: Build (no CUDA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build
      - run: cargo test

  build-cuda:
    name: Build (CUDA feature, compile-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '13.1.0'
          method: 'network'
          sub-packages: '["nvcc", "nvrtc", "nvrtc-dev", "cufft", "cufft-dev", "cudart"]'
      - run: cargo build --features cuda
        env:
          CUDARC_CUDA_VERSION: "13010"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
